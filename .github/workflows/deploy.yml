name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        type: choice
        options:
          - s01 — Intro, Context & HMI Foundations
          - s02 — Users, Tasks & HMI Architecture
          - s03 — Figma Basics & Wireframes
          - s04 — Flows, Components & Basic Prototypes
          - s05 — Physical Controls, Arduino & ProtoPie
          - s06 — Navigation Patterns & Layout
          - s07 — Wireframes II: Flows & States
          - s08 — Visual Language & Design System
          - s09 — Applying Visual Design to Screens
          - s10 — High-Fidelity Prototype & Motion
          - s11 — Usability Checks & Iteration
          - s12 — Refinement I
          - s13 — Refinement II & Exam Prep
          - index
          - all

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ !startsWith(github.event.inputs.target, 'index') }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: slides/package-lock.json

      - name: Install dependencies
        if: ${{ !startsWith(github.event.inputs.target, 'index') }}
        run: npm ci
        working-directory: slides

      - name: Build deck(s)
        if: ${{ !startsWith(github.event.inputs.target, 'index') }}
        working-directory: slides
        env:
          TARGET: ${{ github.event.inputs.target }}
        run: |
          build() {
            echo "▶ Building $1"
            npx slidev build "$2" --base /ied-hmi-2526/$1/ --out dist/$1
          }
          case "${TARGET%% *}" in
            s01) build s01 s01_intro.md ;;
            s02) build s02 s02_users_tasks.md ;;
            s03) build s03 s03_figma_basics.md ;;
            s04) build s04 s04_flows_prototypes.md ;;
            s05) build s05 s05_physical_controls.md ;;
            s06) build s06 s06_navigation_layout.md ;;
            s07) build s07 s07_wireframes_II.md ;;
            s08) build s08 s08_visual_language.md ;;
            s09) build s09 s09_visual_design.md ;;
            s10) build s10 s10_hifi_motion.md ;;
            s11) build s11 s11_usability.md ;;
            s12) build s12 s12_refinement_I.md ;;
            s13) build s13 s13_refinement_II.md ;;
            all)
              build s01 s01_intro.md
              build s02 s02_users_tasks.md
              build s03 s03_figma_basics.md
              build s04 s04_flows_prototypes.md
              build s05 s05_physical_controls.md
              build s06 s06_navigation_layout.md
              build s07 s07_wireframes_II.md
              build s08 s08_visual_language.md
              build s09 s09_visual_design.md
              build s10 s10_hifi_motion.md
              build s11 s11_usability.md
              build s12 s12_refinement_I.md
              build s13 s13_refinement_II.md
              ;;
          esac

      - name: Add course index page
        run: |
          mkdir -p slides/dist
          cp publish/index.html slides/dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: slides/dist
          keep_files: true
